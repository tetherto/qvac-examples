<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Receipt</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">
          <div class="logo">☕</div>
          <div class="brand-text">
            <div class="brand-title">Order Receipt</div>
            <div class="brand-subtitle">Client-only QR receipt viewer</div>
          </div>
        </div>
      </header>

      <main class="main">
        <section class="card" id="receiptCard" aria-live="polite">
          <div class="card-header">
            <div>
              <div class="label">Order</div>
              <div class="headline" id="orderId">—</div>
            </div>
            <div class="chip" id="statusChip">Decoded</div>
          </div>

          <div class="divider"></div>

          <div class="grid">
            <div class="field">
              <div class="label">Customer</div>
              <div class="value" id="customerName">—</div>
            </div>
            <div class="field">
              <div class="label">Timestamp</div>
              <div class="value mono" id="timestamp">—</div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="section">
            <div class="section-title">Items</div>
            <div class="items" id="items"></div>
          </div>

          <div class="divider"></div>

          <div class="total-row">
            <div class="label">Total</div>
            <div class="total-value" id="total">—</div>
          </div>

          <div class="divider"></div>

          <div class="section" id="txSection" style="display: none;">
            <div class="section-title">Transaction</div>
            <div class="tx-row">
              <div class="tx-hash mono" id="txHash">—</div>
              <button class="btn" id="copyTxBtn" type="button">Copy</button>
            </div>
            <a class="link" id="explorerLink" href="#" target="_blank" rel="noreferrer" style="display: none;">
              View on explorer →
            </a>
          </div>
        </section>

      </main>

      <footer class="footer">
        <span class="muted">No backend. No tracking. Data is only in the URL.</span>
      </footer>
    </div>

    <script>
      // -------------------------------------------------------------
      // Base64url decode (UTF-8)
      // -------------------------------------------------------------
      const base64UrlToBase64 = (b64url) => {
        const pad = '='.repeat((4 - (b64url.length % 4)) % 4);
        return (b64url + pad).replace(/-/g, '+').replace(/_/g, '/');
      };

      const decodeBase64Utf8 = (b64) => {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new TextDecoder('utf-8').decode(bytes);
      };

      const decodePayloadFromHash = () => {
        const hash = window.location.hash || '';
        const qs = hash.startsWith('#') ? hash.slice(1) : hash;
        const params = new URLSearchParams(qs);
        const p = params.get('p');
        if (!p) return { ok: false, error: 'Missing #p payload' };

        try {
          const json = decodeBase64Utf8(base64UrlToBase64(p));
          const parsed = JSON.parse(json);
          return { ok: true, payload: parsed, raw: json };
        } catch (e) {
          return { ok: false, error: 'Invalid payload (failed to decode JSON)' };
        }
      };

      // -------------------------------------------------------------
      // Rendering
      // -------------------------------------------------------------
      const el = (id) => document.getElementById(id);

      const renderItems = (items) => {
        const container = el('items');
        container.innerHTML = '';
        if (!Array.isArray(items) || items.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'muted';
          empty.textContent = 'No items';
          container.appendChild(empty);
          return;
        }

        for (const item of items) {
          const row = document.createElement('div');
          row.className = 'item-row';

          const left = document.createElement('div');
          const drink = item?.drink || 'drink';
          const size = item?.size ? String(item.size) : '';
          const title = document.createElement('div');
          title.className = 'item-title';
          title.textContent = size ? `${size} ${drink}` : drink;
          left.appendChild(title);

          const extras = Array.isArray(item?.extras) ? item.extras.filter(Boolean) : [];
          if (extras.length > 0) {
            const sub = document.createElement('div');
            sub.className = 'item-sub';
            sub.textContent = extras.join(' • ');
            left.appendChild(sub);
          }

          row.appendChild(left);
          container.appendChild(row);
        }
      };

      const formatMoney = (total, currency) => {
        if (typeof total !== 'number') return '—';
        const cur = currency ? String(currency) : '';
        const amount = total.toFixed(2);
        return cur ? `${amount} ${cur}` : amount;
      };

      const renderReceipt = (payload, rawJson) => {
        // versioned payload; tolerate unknown fields
        const v = payload?.v;
        if (v !== 1) {
          el('statusChip').textContent = 'Unsupported';
          throw new Error('Unsupported payload version');
        }

        el('orderId').textContent = payload.orderId || '—';
        el('customerName').textContent = payload.customerName || '—';
        el('timestamp').textContent = payload.timestamp || '—';
        el('total').textContent = formatMoney(payload.total, payload.currency);

        renderItems(payload.items);

        const tx = payload.tx || null;
        const txHash = tx?.hash || '';
        const explorerUrl = tx?.explorerUrl || '';

        if (txHash || explorerUrl) {
          el('txSection').style.display = '';
          el('txHash').textContent = txHash || '—';

          const linkEl = el('explorerLink');
          if (explorerUrl) {
            linkEl.href = explorerUrl;
            linkEl.style.display = '';
          } else {
            linkEl.style.display = 'none';
          }
        } else {
          el('txSection').style.display = 'none';
        }

      };

      el('copyTxBtn').addEventListener('click', async () => {
        const text = (el('txHash').textContent || '').trim();
        if (!text || text === '—') return;
        try {
          await navigator.clipboard.writeText(text);
          el('copyTxBtn').textContent = 'Copied';
          setTimeout(() => (el('copyTxBtn').textContent = 'Copy'), 900);
        } catch {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          el('copyTxBtn').textContent = 'Copied';
          setTimeout(() => (el('copyTxBtn').textContent = 'Copy'), 900);
        }
      });

      // -------------------------------------------------------------
      // Boot
      // -------------------------------------------------------------
      const result = decodePayloadFromHash();
      if (!result.ok) {
        el('statusChip').textContent = 'Missing';
        el('receiptCard').classList.add('error');
        el('orderId').textContent = 'No receipt payload';
        el('customerName').textContent = '—';
        el('timestamp').textContent = '—';
        el('items').innerHTML = `<div class="error-text">${result.error}</div>`;
        el('total').textContent = '—';
        el('txSection').style.display = 'none';
      } else {
        try {
          renderReceipt(result.payload, result.raw);
          el('statusChip').textContent = 'Ready';
        } catch (e) {
          el('statusChip').textContent = 'Error';
          el('receiptCard').classList.add('error');
          el('items').innerHTML = `<div class="error-text">${e?.message || 'Failed to render receipt'}</div>`;
        }
      }

      // Re-render on hash changes (e.g., scanning multiple QRs)
      window.addEventListener('hashchange', () => window.location.reload());
    </script>
  </body>
</html>
