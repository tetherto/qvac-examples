    <div class="config-form">
      <div class="config-section">
        <h3>Server Configuration</h3>
        <div class="config-row">
          <label for="apiUrl">Coffee Shop API URL</label>
          <input type="text" id="apiUrl" value="http://localhost:3457" />
        </div>
      </div>

      <div class="config-section">
        <h3>Models</h3>
        <div class="config-row">
          <label for="llmModelPath">LLM Model Path</label>
          <input type="text" id="llmModelPath" value="./models/Qwen3-4B-Instruct-2507-Q8_0.gguf" />
        </div>
        <div class="config-row">
          <label for="ttsVoice">TTS Voice</label>
          <select id="ttsVoice">
            <option value="ryan">Ryan (US Male)</option>
            <option value="norman">Norman (SDK Default)</option>
            <option value="semaine" selected>Semaine (UK Female)</option>
          </select>
        </div>
        <div class="config-row">
          <label for="espeakPath">eSpeak Data Path</label>
          <input type="text" id="espeakPath" value="/opt/homebrew/Cellar/espeak-ng/1.52.0/share/espeak-ng-data" />
        </div>
      </div>

      <div class="config-section">
        <h3>Payment</h3>
        <div class="config-row checkbox-row">
          <input type="checkbox" id="useRealPayments" />
          <label for="useRealPayments">Enable Real Payments (Testnet)</label>
        </div>
        <div class="config-row">
          <label for="networkMode">Network Mode</label>
          <select id="networkMode">
            <option value="testnet" selected>Testnet</option>
            <option value="mainnet">Mainnet</option>
          </select>
        </div>
        <div class="config-row">
          <label for="paymentCurrency">Payment Currency</label>
          <select id="paymentCurrency">
            <option value="USDT" selected>USDT</option>
            <option value="USDC">USDC</option>
            <option value="ETH">ETH</option>
            <option value="BTC">BTC (Lightning ⚡)</option>
          </select>
        </div>
      </div>

      <div class="config-section">
        <h3>Agent Settings</h3>
        <div class="config-row">
          <label for="maxTurns">Max Turns</label>
          <input type="number" id="maxTurns" value="25" min="5" max="100" />
        </div>
        <div class="config-row checkbox-row">
          <input type="checkbox" id="verbose" />
          <label for="verbose">Verbose Logging</label>
        </div>
      </div>

      <button id="startBtn" class="start-button">
        <span class="btn-text">Start QVAC</span>
        <span class="btn-icon">&#8594;</span>
      </button>
    </div>

        <div class="loading-progress">
          <div id="loading-bar" class="loading-bar"></div>
        </div>
      </div>
    </div>

  <script>
    // =========================================================================
    // WebSocket Connection
    // =========================================================================
    
    let ws = null;
    let isConnected = false;
    let currentState = null;
    let isRecording = false;
    let audioStream = null;
    let audioContext = null;
    let scriptProcessor = null;
    let audioChunks = [];

    // Audio playback
    let playbackContext = null;
    let analyser = null;
    let isPlaying = false;
    let currentAudioSource = null; // Track current audio source for stopping

    const connectWebSocket = () => {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws`;
      
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        console.log('Connected to QVAC server');
        isConnected = true;
        ws.send(JSON.stringify({ type: 'get_config' }));
      };
      
      ws.onclose = () => {
        console.log('Disconnected from server');
        isConnected = false;
        setTimeout(connectWebSocket, 3000);
      };
      
      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      };
    };

    // =========================================================================
    // Message Handlers
    // =========================================================================

    const handleServerMessage = (data) => {
      switch (data.type) {
        case 'config_loaded':
          populateConfig(data.config, data.userProfile);
          break;
          
        case 'status':
          updateLoadingStatus(data.message);
          // Also update reloading overlay if visible
          updateReloadingStatus(data.message);
          break;
          
        case 'loading_progress':
          updateLoadingProgress(data.model, data.progress);
          // Also update reloading overlay if visible
          updateReloadingProgress(data.progress);
          break;
          
        case 'agent_ready':
          hideLoading();
          hideReloadingOverlay();
          showQVACInterface();
          if (data.state) currentState = data.state;
          break;
          
        case 'agent_reset':
          // Stop any playing audio immediately
          stopCurrentAudio();
          clearStatusMessages();
          currentState = null;
          if (data.reloading) {
            // Show loading overlay while models are being reloaded
            showReloadingOverlay();
          }
          if (data.state) currentState = data.state;
          break;
          
        case 'processing_start':
          // Hide previous response when user starts a new interaction
          hideCurrentResponse();
          showProcessingIndicator();
          break;
          
        case 'tool_call':
          showToolStatus(data.tool, data.status, data.args, data.result);
          break;
          
        case 'state_update':
          currentState = data.state;
          break;
          
        case 'llm_complete':
          // Hide previous response before showing new one
          hideCurrentResponse();
          hideProcessingIndicator();
          showStatusMessage(data.text, 'response');
          break;
          
        case 'tts_audio':
          stopWaveformAnimation();
          playTTSAudio(data.audio);
          break;
          
        case 'filler_audio':
          playFillerAudio(data.audio, data.text);
          break;
          
        case 'transcription_complete':
          // Hide previous response when user speaks
          hideCurrentResponse();
          showStatusMessage(data.text, 'user');
          break;
          
        case 'transcribing':
          showStatusMessage('Listening...', 'status');
          break;
          
        case 'transcription_empty':
          showStatusMessage('No speech detected', 'status');
          break;
          
        case 'payment_complete':
          showStatusMessage(`Payment complete! Order #${data.orderId}`, 'success');
          break;
          
        case 'qr_code':
          showQRCode(data);
          break;
          
        case 'error':
          hideProcessingIndicator();
          stopWaveformAnimation();
          showStatusMessage(data.message, 'error');
          break;
          
        case 'stop_audio':
          // Server requested audio stop
          stopCurrentAudio();
          break;
      }
    };

    // =========================================================================
    // UI Updates
    // =========================================================================

    const populateConfig = (config, userProfile) => {
      if (config) {
        document.getElementById('apiUrl').value = config.coffeeShopApiUrl || '';
        document.getElementById('llmModelPath').value = config.llmModelPath || '';
        document.getElementById('ttsVoice').value = config.ttsVoice || 'semaine';
        document.getElementById('espeakPath').value = config.espeakDataPath || '';
        document.getElementById('useRealPayments').checked = config.useRealPayments || false;
        document.getElementById('networkMode').value = config.networkMode || 'testnet';
        document.getElementById('paymentCurrency').value = config.paymentCurrency || 'USDT';
        document.getElementById('maxTurns').value = config.maxTurns || 25;
        document.getElementById('verbose').checked = config.verbose || true;
      }
    };

      document.getElementById('loading-overlay').classList.remove('hidden');
    };

    const hideLoading = () => {
      document.getElementById('loading-overlay').classList.add('hidden');
    };

    const updateLoadingStatus = (message) => {

    };

      document.getElementById('config-panel').classList.add('hidden');

    const hideReloadingOverlay = () => {

    const updateReloadingStatus = (message) => {

    // =========================================================================

    const TOOL_FRIENDLY_NAMES = {
      'profile.get_defaults': { calling: 'Checking saved preferences...', done: 'Found your profile' },
      'state.get': { calling: 'Reading order state...', done: 'State loaded' },
      'state.patch': { calling: 'Updating order details...', done: 'Order updated' },
      'state.missing_fields': { calling: 'Checking for missing info...', done: 'Validation complete' },
      'state.advance_if_ready': { calling: 'Checking if ready to proceed...', done: 'Ready to continue' },

    // Track current response message to keep it visible until TTS completes
    let currentResponseElement = null;

    const showToolStatus = (toolName, status, args, result) => {
      const friendly = TOOL_FRIENDLY_NAMES[toolName];
      if (!friendly) return;
      
      const message = status === 'calling' ? friendly.calling : friendly.done;

    const showOrderSummaryList = (orderDetails) => {

            ${orderDetails.deliveryFee ? `<div class="price-row"><span>Delivery</span><span>${orderDetails.deliveryFee.toFixed(2)} ${currency}</span></div>` : ''}

    };

    const showMenuDisplay = (menuData) => {
      const container = document.getElementById('status-container');
      
      // Group drinks by category
      const drinksByCategory = {};
      const categoryNames = {
        'espresso': 'Espresso',

        'other': 'Other'
      };
      
      menuData.drinks.forEach(drink => {

      });

      let drinksHtml = '';

        drinksHtml += `<div class="menu-category">

              <div class="menu-item">

                <span class="item-price">${d.price}</span>
              </div>
            `).join('')}
          </div>
        </div>`;
      }
      
      // Build options HTML
      const optionsHtml = menuData.options && menuData.options.length > 0
        ? `<div class="menu-category">
            <div class="category-name">Extras</div>
            <div class="menu-items">
              ${menuData.options.map(o => `
                <div class="menu-item">
                  <span class="item-name">${o.name}</span>
                  <span class="item-price">${o.price}</span>
                </div>
              `).join('')}
            </div>
          </div>`
        : '';
      
      // Remove any existing menu display first
      const existingMenu = container.querySelector('.status-menu-display');
      if (existingMenu) existingMenu.remove();
      
      const msgEl = document.createElement('div');
      msgEl.className = 'status-message status-menu-display visible';
      msgEl.innerHTML = `
        <div class="menu-card">
          <div class="menu-header">Menu</div>
          <div class="menu-content">
            ${drinksHtml}
            ${optionsHtml}
          </div>
        </div>
      `;
      
      container.appendChild(msgEl);
      
      // Menu stays visible until order summary is shown or order completes
      // (will be removed by hideMenuDisplay when stage changes)
    };
    
    const hideMenuDisplay = () => {
      const container = document.getElementById('status-container');
      const menuEl = container.querySelector('.status-menu-display');
      if (menuEl) {
        menuEl.classList.remove('visible');
        setTimeout(() => menuEl.remove(), 300);
      }
    };

    const showStatusMessage = (text, type = 'status', persistent = false) => {
      const container = document.getElementById('status-container');
      
      // Clean the text for display (remove markdown/emojis)
      const cleanText = text
        .replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]/gu, '')
        .replace(/\*\*([^*]+)\*\*/g, '$1')
        .replace(/\*([^*]+)\*/g, '$1')
        .replace(/__([^_]+)__/g, '$1')
        .replace(/_([^_]+)_/g, '$1')
        .replace(/^[\s]*[-•*]\s+/gm, '')
        .replace(/^#+\s*/gm, '')
        .trim();
      
      // Create message element
      const msgEl = document.createElement('div');
      msgEl.className = `status-message status-${type}`;
      msgEl.textContent = cleanText;
      
      // Add to container
      container.appendChild(msgEl);
      
      // Trigger animation
      requestAnimationFrame(() => {
        msgEl.classList.add('visible');
      });
      
      // For response type, keep visible until TTS completes (persistent)
      if (type === 'response') {
        // Remove previous response if any
        if (currentResponseElement && currentResponseElement.parentNode) {
          currentResponseElement.remove();
        }
        currentResponseElement = msgEl;
        // Don't auto-remove - will be removed when TTS ends
        return msgEl;
      }
      
      // Auto-remove after delay for non-response types
      const delay = type === 'error' || type === 'success' ? 6000 : 3000;
      setTimeout(() => {
        msgEl.classList.remove('visible');
        setTimeout(() => msgEl.remove(), 500);
      }, delay);
      
      // Keep only last 3 messages (excluding current response, menu display, and order summary)
      const nonResponseMessages = Array.from(container.children).filter(el => 
        el !== currentResponseElement && 
        !el.classList.contains('status-menu-display') &&
        !el.classList.contains('status-order-summary')
      );
      while (nonResponseMessages.length > 3) {
        const toRemove = nonResponseMessages.shift();
        if (toRemove) toRemove.remove();
      }
      
      return msgEl;
    };

    const hideCurrentResponse = () => {
      if (currentResponseElement && currentResponseElement.parentNode) {
        currentResponseElement.classList.remove('visible');
        setTimeout(() => {
          if (currentResponseElement && currentResponseElement.parentNode) {
            currentResponseElement.remove();
          }
          currentResponseElement = null;
        }, 500);
      }
    };

    const clearStatusMessages = () => {
      const container = document.getElementById('status-container');
      container.innerHTML = '';
      currentResponseElement = null;
      hideProcessingIndicator();
    };

    const showQRCode = (data) => {
      const container = document.getElementById('status-container');
      
      // Build receipt URL
      const receiptUrl = data.receiptUrl || `http://localhost:3456/receipt/${data.orderId}`;
      
      const msgEl = document.createElement('div');
      msgEl.className = 'status-message status-qr visible';
      msgEl.innerHTML = `
        <a href="${receiptUrl}" target="_blank" class="qr-link" title="View receipt">
          <div class="qr-card">
            <img src="${data.imageDataUrl}" alt="Order QR" class="qr-image" />
            <div class="qr-info">
              <span class="qr-label">Order #${data.orderId}</span>
              <span class="qr-text">Tap to view receipt</span>
              <span class="qr-subtext">Pick up at BitCafe booth</span>
            </div>
          </div>
        </a>
      `;
      
      container.appendChild(msgEl);
      
      // Don't auto-remove QR code - let user interact with it
      // It will be cleared on reset
    };

    // =========================================================================
    // Waveform Visualizer
    // =========================================================================

    let waveformCanvas = null;
    let waveformCtx = null;
    let waveformAnimationId = null;
    let waveformBars = [];
    const NUM_BARS = 40;

    const initWaveform = () => {
      waveformCanvas = document.getElementById('waveform');
      waveformCtx = waveformCanvas.getContext('2d');
      
      // Set canvas size
      const rect = waveformCanvas.parentElement.getBoundingClientRect();
      waveformCanvas.width = rect.width;
      waveformCanvas.height = rect.height;
      
      // Initialize bars - only need half since we mirror
      const halfBars = Math.floor(NUM_BARS / 2);
      waveformBars = Array(halfBars).fill(0).map(() => ({
        height: 2,
        targetHeight: 2,
        velocity: 0
      }));
      
      // Start idle animation
      animateWaveform(false);
    };

    // Gaussian function for bell curve shape
    const gaussian = (x, mean, sigma) => {
      return Math.exp(-Math.pow(x - mean, 2) / (2 * Math.pow(sigma, 2)));
    };

    const animateWaveform = (isActive) => {
      if (!waveformCtx) return;
      
      const width = waveformCanvas.width;
      const height = waveformCanvas.height;
      const halfBars = waveformBars.length;
      const totalBars = halfBars * 2;
      const barWidth = width / totalBars * 0.5;
      const gap = width / totalBars * 0.5;
      const centerX = width / 2;
      
      // Clear canvas
      waveformCtx.clearRect(0, 0, width, height);
      
      // Get audio data if available
      let dataArray = null;
      if (isActive && analyser) {
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
      }
      
      // Update and draw bars symmetrically from center
      waveformBars.forEach((bar, i) => {
        // Distance from center (0 = center, 1 = edge)
        const distFromCenter = i / halfBars;
        
        // Bell curve multiplier - taller in center, shorter at edges
        const bellCurve = gaussian(distFromCenter, 0, 0.6);
        
        // Update target height
        if (isActive && dataArray) {
          // Use actual audio data when playing
          // Map center bars to low frequencies, edge bars to high
          const freqIndex = Math.floor(i / halfBars * dataArray.length * 0.5);
          const audioLevel = dataArray[freqIndex] / 255;
          bar.targetHeight = 4 + audioLevel * height * 0.7 * bellCurve;
        } else if (isActive) {
          // Random heights when active but no analyser
          const randomPulse = 0.5 + Math.random() * 0.5;
          bar.targetHeight = 4 + height * 0.5 * bellCurve * randomPulse;
        } else {
          // Idle state - subtle breathing centered wave
          const breathe = Math.sin(Date.now() / 800) * 0.3 + 0.7;
          const wave = Math.sin(Date.now() / 400 + i * 0.2) * 0.2 + 0.8;
          bar.targetHeight = 4 + 15 * bellCurve * breathe * wave;
        }
        
        // Smooth animation
        const diff = bar.targetHeight - bar.height;
        bar.velocity += diff * 0.15;
        bar.velocity *= 0.75;
        bar.height += bar.velocity;
        
        const barHeight = Math.max(3, bar.height);
        const y = (height - barHeight) / 2;
        
        // Gradient color with glow effect
        const gradient = waveformCtx.createLinearGradient(0, y, 0, y + barHeight);
        const intensity = Math.min(1, barHeight / (height * 0.5));
        gradient.addColorStop(0, `rgba(22, 227, 193, ${0.2 * intensity})`);
        gradient.addColorStop(0.5, `rgba(22, 227, 193, ${0.9 * intensity})`);
        gradient.addColorStop(1, `rgba(22, 227, 193, ${0.2 * intensity})`);
        
        waveformCtx.fillStyle = gradient;
        
        // Draw right side bar (from center going right)
        const rightX = centerX + (i * (barWidth + gap)) + gap / 2;
        waveformCtx.beginPath();
        waveformCtx.roundRect(rightX, y, barWidth, barHeight, 2);
        waveformCtx.fill();
        
        // Draw left side bar (mirror from center going left)
        const leftX = centerX - ((i + 1) * (barWidth + gap)) + gap / 2;
        waveformCtx.beginPath();
        waveformCtx.roundRect(leftX, y, barWidth, barHeight, 2);
        waveformCtx.fill();
      });
      
      waveformAnimationId = requestAnimationFrame(() => animateWaveform(isActive || isPlaying));
    };

    const startWaveformAnimation = () => {
      isPlaying = true;
    };

    const stopWaveformAnimation = () => {
      isPlaying = false;
    };

    // =========================================================================
    // Audio Playback
    // =========================================================================

    const initPlaybackContext = () => {
      if (!playbackContext) {
        playbackContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = playbackContext.createAnalyser();
        analyser.fftSize = 256;
        analyser.connect(playbackContext.destination);
      }
      return playbackContext;
    };

    // Stop any currently playing audio
    const stopCurrentAudio = () => {
      if (currentAudioSource) {
        try {
          currentAudioSource.stop();
        } catch (e) {
          // Already stopped, ignore
        }
        currentAudioSource = null;
      }
      stopWaveformAnimation();
    };

    const playTTSAudio = async (base64Audio) => {
      try {
        const ctx = initPlaybackContext();
        
        if (ctx.state === 'suspended') {
          await ctx.resume();
        }
        
        const binaryString = atob(base64Audio);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        
        const audioBuffer = await ctx.decodeAudioData(bytes.buffer);
        
        // Stop any currently playing audio first
        stopCurrentAudio();
        
        const source = ctx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(analyser);
        
        // Track this source so we can stop it
        currentAudioSource = source;
        
        startWaveformAnimation();
        
        source.onended = () => {
          if (currentAudioSource === source) {
            currentAudioSource = null;
          }
          stopWaveformAnimation();
          // Keep the response message visible - it will be hidden when a new event arrives
        };
        
        source.start(0);
      } catch (error) {
        console.error('Error playing TTS audio:', error);
        stopWaveformAnimation();
        // Keep the response message visible even on error
      }
    };

    const playFillerAudio = async (base64Audio, text) => {
      // Show the filler text as a status message
      showStatusMessage(text, 'filler');
      
      try {
        const ctx = initPlaybackContext();
        
        if (ctx.state === 'suspended') {
          await ctx.resume();
        }
        
        const binaryString = atob(base64Audio);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        
        const audioBuffer = await ctx.decodeAudioData(bytes.buffer);
        
        // Stop any currently playing audio first
        stopCurrentAudio();
        
        const source = ctx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(analyser);
        
        // Track this source so we can stop it
        currentAudioSource = source;
        
        startWaveformAnimation();
        
        source.onended = () => {
          if (currentAudioSource === source) {
            currentAudioSource = null;
          }
          // Don't stop animation yet, might be more audio coming
        };
        
        source.start(0);
      } catch (error) {
        console.error('Error playing filler audio:', error);
      }
    };

    // =========================================================================
    // Voice Recording
    // =========================================================================

    const float32ToBase64 = (float32Array) => {
      const buffer = new ArrayBuffer(float32Array.length * 4);
      const view = new DataView(buffer);
      for (let i = 0; i < float32Array.length; i++) {
        let value = float32Array[i];
        if (!Number.isFinite(value)) {
          value = 0;
        } else {
          value = Math.max(-1, Math.min(1, value));
        }
        view.setFloat32(i * 4, value, true);
      }
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    };

    const startRecording = async () => {
      try {
        // IMPORTANT: Stop any currently playing TTS audio immediately
        stopCurrentAudio();
        
        // Tell the server to stop sending more audio (clear TTS queue)
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'stop_audio' }));
        }
        
        audioStream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          }
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(audioStream);
        
        scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
        audioChunks = [];

        scriptProcessor.onaudioprocess = (event) => {
          const inputData = event.inputBuffer.getChannelData(0);
          audioChunks.push(new Float32Array(inputData));
        };

        source.connect(scriptProcessor);
        scriptProcessor.connect(audioContext.destination);

        isRecording = true;
        document.getElementById('voiceBtn').classList.add('recording');
        
        // Show recording indicator
        showStatusMessage('Listening...', 'status');

      } catch (error) {
        console.error('Error starting recording:', error);
        showStatusMessage('Microphone access denied', 'error');
      }
    };

    const stopRecording = async () => {
      if (!isRecording) return;
      
      document.getElementById('voiceBtn').classList.remove('recording');
      isRecording = false;

      if (scriptProcessor) {
        scriptProcessor.disconnect();
        scriptProcessor = null;
      }

      if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
        audioStream = null;
      }

      if (audioChunks.length === 0) {
        return;
      }

      showStatusMessage('Processing...', 'status');

      try {
        const totalLength = audioChunks.reduce((sum, chunk) => sum + chunk.length, 0);
        const combinedAudio = new Float32Array(totalLength);
        let offset = 0;
        for (const chunk of audioChunks) {
          combinedAudio.set(chunk, offset);
          offset += chunk.length;
        }

        const sourceSampleRate = audioContext?.sampleRate || 44100;
        const durationSeconds = totalLength / sourceSampleRate;

        if (durationSeconds < 0.5) {
          showStatusMessage('Recording too short', 'status');
          return;
        }

        // Resample to 16kHz
        let audioData;
        if (sourceSampleRate !== 16000) {
          const targetSampleRate = 16000;
          const ratio = sourceSampleRate / targetSampleRate;
          const newLength = Math.floor(combinedAudio.length / ratio);
          audioData = new Float32Array(newLength);
          
          for (let i = 0; i < newLength; i++) {
            const srcIndex = i * ratio;
            const srcIndexFloor = Math.floor(srcIndex);
            const srcIndexCeil = Math.min(srcIndexFloor + 1, combinedAudio.length - 1);
            const t = srcIndex - srcIndexFloor;
            const value = combinedAudio[srcIndexFloor] * (1 - t) + combinedAudio[srcIndexCeil] * t;
            audioData[i] = Number.isFinite(value) ? Math.max(-1, Math.min(1, value)) : 0;
          }
        } else {
          audioData = new Float32Array(combinedAudio.length);
          for (let i = 0; i < combinedAudio.length; i++) {
            const value = combinedAudio[i];
            audioData[i] = Number.isFinite(value) ? Math.max(-1, Math.min(1, value)) : 0;
          }
        }

        const base64Audio = float32ToBase64(audioData);
        
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ 
            type: 'voice_audio', 
            audio: base64Audio,
            format: 'f32le',
            sampleRate: 16000,
            channels: 1
          }));
        }
      } catch (error) {
        console.error('Error processing audio:', error);
        showStatusMessage('Error processing audio', 'error');
      }

      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      
      audioChunks = [];
    };

    // =========================================================================
    // Event Listeners
    // =========================================================================

    const setupEventListeners = () => {
      // Start button
      document.getElementById('startBtn').addEventListener('click', () => {
        // Initialize AudioContext during user gesture to enable autoplay
        // This must happen during the click handler, before async operations
        initPlaybackContext();
        
        const config = {
          coffeeShopApiUrl: document.getElementById('apiUrl').value,
          llmModelPath: document.getElementById('llmModelPath').value,
          ttsVoice: document.getElementById('ttsVoice').value,
          espeakDataPath: document.getElementById('espeakPath').value,
          useRealPayments: document.getElementById('useRealPayments').checked,
          networkMode: document.getElementById('networkMode').value,
          paymentCurrency: document.getElementById('paymentCurrency').value,
          maxTurns: parseInt(document.getElementById('maxTurns').value),
          verbose: document.getElementById('verbose').checked,
        };
        
        showLoading();
        ws.send(JSON.stringify({ type: 'start', config }));
      });

      // Voice button - toggle recording
      const voiceBtn = document.getElementById('voiceBtn');
      voiceBtn.addEventListener('click', () => {
        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      });

      // Reset button
      document.getElementById('resetBtn').addEventListener('click', () => {
        if (isConnected) {
          ws.send(JSON.stringify({ type: 'reset' }));
        }
      });

      // Handle window resize for waveform
      window.addEventListener('resize', () => {
        if (waveformCanvas) {
          const rect = waveformCanvas.parentElement.getBoundingClientRect();
          waveformCanvas.width = rect.width;
          waveformCanvas.height = rect.height;
        }
      });
    };

    // =========================================================================
    // Initialize
    // =========================================================================

    document.addEventListener('DOMContentLoaded', () => {
      setupEventListeners();
      connectWebSocket();
    });
  </script>
</body>
</html>
