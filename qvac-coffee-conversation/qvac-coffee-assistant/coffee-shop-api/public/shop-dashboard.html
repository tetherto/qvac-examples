<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Dashboard | Coffee Shop</title>
  <link rel="stylesheet" href="/styles/common.css">
  <style>
    /* Page-specific styles */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: var(--space-xl);
      min-height: calc(100vh - 200px);
    }

    @media (max-width: 1100px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
      }
    }

    /* Stats cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    @media (max-width: 900px) {
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-card {
      background: rgba(45, 35, 32, 0.5);
      border: 1px solid rgba(196, 167, 125, 0.15);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      text-align: center;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 600;
      color: var(--color-crema);
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(245, 240, 232, 0.5);
      margin-top: var(--space-xs);
    }

    /* Orders panel */
    .orders-panel {
      display: flex;
      flex-direction: column;
    }

    .orders-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .filter-tabs {
      display: flex;
      gap: var(--space-xs);
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: var(--space-xs) var(--space-md);
      background: transparent;
      border: 1px solid rgba(196, 167, 125, 0.2);
      border-radius: var(--radius-md);
      color: rgba(245, 240, 232, 0.6);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-tab:hover {
      background: rgba(196, 167, 125, 0.1);
      color: var(--color-foam);
    }

    .filter-tab.active {
      background: rgba(196, 167, 125, 0.2);
      border-color: var(--color-crema);
      color: var(--color-crema);
    }

    /* Order cards */
    .orders-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      max-height: calc(100vh - 400px);
      padding-right: var(--space-sm);
    }

    .order-card {
      background: rgba(45, 35, 32, 0.6);
      border: 1px solid rgba(196, 167, 125, 0.15);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      transition: all 0.2s ease;
    }

    .order-card:hover {
      border-color: rgba(196, 167, 125, 0.3);
    }

    .order-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: var(--space-md);
    }

    .order-id {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-crema);
    }

    .order-customer {
      font-size: 0.875rem;
      color: rgba(245, 240, 232, 0.7);
      margin-top: var(--space-xs);
    }

    .order-time {
      font-size: 0.75rem;
      color: rgba(245, 240, 232, 0.4);
      margin-top: var(--space-xs);
    }

    .order-items {
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin: var(--space-md) 0;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-xs) 0;
      font-size: 0.875rem;
    }

    .order-item:not(:last-child) {
      border-bottom: 1px solid rgba(196, 167, 125, 0.1);
    }

    .item-name {
      color: var(--color-foam);
    }

    .item-details {
      font-size: 0.75rem;
      color: rgba(245, 240, 232, 0.5);
    }

    .item-qty {
      color: var(--color-crema);
      font-family: var(--font-mono);
    }

    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: var(--space-md);
      border-top: 1px solid rgba(196, 167, 125, 0.1);
    }

    .order-total {
      font-family: var(--font-mono);
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--color-crema);
    }

    .fulfillment-badge {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      background: rgba(139, 154, 125, 0.2);
      color: var(--color-sage);
    }

    .fulfillment-badge.delivery {
      background: rgba(96, 165, 250, 0.2);
      color: #60a5fa;
    }

    /* Shop wallet sidebar */
    .wallet-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .sidebar-card {
      background: rgba(45, 35, 32, 0.6);
      border: 1px solid rgba(196, 167, 125, 0.15);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
    }

    .sidebar-title {
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--color-crema);
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .shop-wallet-item {
      padding: var(--space-md) 0;
      border-bottom: 1px solid rgba(196, 167, 125, 0.1);
    }

    .shop-wallet-item:last-child {
      border-bottom: none;
    }

    .shop-wallet-chain {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-xs);
    }

    .chain-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .chain-dot[data-chain="ethereum"] { background: var(--chain-ethereum); }
    .chain-dot[data-chain="bitcoin"] { background: var(--chain-bitcoin); }
    .chain-dot[data-chain="solana"] { background: var(--chain-solana); }
    .chain-dot[data-chain="tron"] { background: var(--chain-tron); }

    .chain-name {
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: capitalize;
    }

    .shop-wallet-address {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      color: rgba(245, 240, 232, 0.5);
      word-break: break-all;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .shop-wallet-address:hover {
      color: var(--color-foam);
    }

    .shop-wallet-balances {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin: var(--space-xs) 0;
    }

    .shop-balance-native {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--color-crema);
    }

    .shop-balance-usdt {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: rgba(245, 240, 232, 0.5);
    }

    .shop-balance-usdt.has-balance {
      color: #26a17b;
      font-weight: 500;
    }

    /* Config panel */
    .config-item {
      display: flex;
      justify-content: space-between;
      padding: var(--space-sm) 0;
      font-size: 0.875rem;
    }

    .config-label {
      color: rgba(245, 240, 232, 0.5);
    }

    .config-value {
      font-family: var(--font-mono);
      color: var(--color-crema);
    }

    /* Action buttons */
    .order-actions {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }

    .action-btn {
      flex: 1;
      padding: var(--space-sm);
      border: 1px solid rgba(196, 167, 125, 0.2);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--color-crema);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: rgba(196, 167, 125, 0.1);
    }

    .action-btn.primary {
      background: rgba(74, 222, 128, 0.15);
      border-color: rgba(74, 222, 128, 0.3);
      color: var(--status-paid);
    }

    .action-btn.primary:hover {
      background: rgba(74, 222, 128, 0.25);
    }

    /* Empty state */
    .no-orders {
      text-align: center;
      padding: var(--space-2xl);
      color: rgba(245, 240, 232, 0.4);
    }

    .no-orders-icon {
      font-size: 4rem;
      margin-bottom: var(--space-md);
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <div class="header-logo">☕</div>
        <div>
          <h1 style="font-size: 1.5rem; margin: 0;">Coffee Shop</h1>
          <span class="text-muted" style="font-size: 0.75rem;">Shop Dashboard</span>
        </div>
      </div>
      <nav class="header-nav">
        <a href="/customer-wallet" class="nav-link">Customer Wallet</a>
        <a href="/shop-dashboard" class="nav-link active">Shop Dashboard</a>
      </nav>
    </header>

    <!-- Stats row -->
    <section class="stats-row stagger">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-label">Pending Payment</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-active">0</div>
        <div class="stat-label">Active Orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-revenue">$0</div>
        <div class="stat-label">Today's Revenue</div>
      </div>
    </section>

    <!-- Main dashboard layout -->
    <div class="dashboard-layout">
      <!-- Orders panel -->
      <section class="orders-panel">
        <div class="orders-header">
          <h2 style="margin: 0;">Orders</h2>
          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="pending_payment">Pending</button>
            <button class="filter-tab" data-filter="paid">Paid</button>
            <button class="filter-tab" data-filter="preparing">Preparing</button>
            <button class="filter-tab" data-filter="ready">Ready</button>
            <button class="filter-tab" data-filter="delivered">Delivered</button>
          </div>
          <div class="refresh-indicator">
            <span class="refresh-dot"></span>
            <span>Live • Refreshing every 5s</span>
          </div>
        </div>

        <div id="orders-list" class="orders-list">
          <!-- Orders will be rendered here -->
          <div class="loading">
            <div class="spinner"></div>
          </div>
        </div>
      </section>

      <!-- Wallet sidebar -->
      <aside class="wallet-sidebar">
        <!-- Shop receiving addresses -->
        <div class="sidebar-card">
          <h3 class="sidebar-title">
            <span>💰</span>
            <span>Shop Wallets</span>
          </h3>
          <div id="shop-wallets">
            <div class="loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>

        <!-- Shop config -->
        <div class="sidebar-card">
          <h3 class="sidebar-title">
            <span>⚙️</span>
            <span>Configuration</span>
          </h3>
          <div id="shop-config">
            <div class="config-item">
              <span class="config-label">x402 Mode</span>
              <span class="config-value" id="config-mode">—</span>
            </div>
            <div class="config-item">
              <span class="config-label">Currency</span>
              <span class="config-value" id="config-currency">—</span>
            </div>
            <div class="config-item">
              <span class="config-label">Network</span>
              <span class="config-value" id="config-network">—</span>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script>
    const API_BASE = '/api';
    let currentFilter = 'all';
    let orders = [];
    let menu = null;

    // Status display info
    const statusInfo = {
      pending_payment: { label: 'Pending', class: 'badge-pending' },
      paid: { label: 'Paid', class: 'badge-paid' },
      preparing: { label: 'Preparing', class: 'badge-preparing' },
      ready: { label: 'Ready', class: 'badge-ready' },
      out_for_delivery: { label: 'Out for Delivery', class: 'badge-delivered' },
      delivered: { label: 'Delivered', class: 'badge-delivered' },
      completed: { label: 'Completed', class: 'badge-paid' },
      cancelled: { label: 'Cancelled', class: 'badge-cancelled' }
    };

    // Fetch orders
    async function fetchOrders() {
      try {
        const response = await fetch(`${API_BASE}/orders`);
        const data = await response.json();
        if (data.success) {
          orders = data.data;
          return orders;
        }
        throw new Error(data.error);
      } catch (error) {
        console.error('Error fetching orders:', error);
        return [];
      }
    }

    // Fetch menu (for drink names)
    async function fetchMenu() {
      try {
        const response = await fetch(`${API_BASE}/menu`);
        const data = await response.json();
        if (data.success) {
          menu = data.data;
          return menu;
        }
      } catch (error) {
        console.error('Error fetching menu:', error);
      }
      return null;
    }

    // Fetch shop wallet addresses
    async function fetchShopWallets() {
      try {
        const response = await fetch(`${API_BASE}/shop/wallet`);
        const data = await response.json();
        if (data.success) {
          return data.data;
        }
      } catch (error) {
        console.error('Error fetching shop wallets:', error);
      }
      return [];
    }

    // Fetch shop config
    async function fetchShopConfig() {
      try {
        const response = await fetch(`${API_BASE}/shop/config`);
        const data = await response.json();
        if (data.success) {
          return data.data;
        }
      } catch (error) {
        console.error('Error fetching shop config:', error);
      }
      return null;
    }

    // Get drink name by ID
    function getDrinkName(drinkId) {
      if (!menu) return drinkId;
      const drink = menu.drinks.find(d => d.id === drinkId);
      return drink ? drink.name : drinkId;
    }

    // Format timestamp
    function formatTime(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      
      return date.toLocaleDateString('en-US', { 
        month: 'short', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Render order card
    function renderOrderCard(order) {
      const status = statusInfo[order.status] || { label: order.status, class: '' };
      const isDelivery = order.fulfillment?.mode === 'delivery';
      
      return `
        <div class="order-card animate-fade-in" data-order-id="${order.id}">
          <div class="order-card-header">
            <div>
              <div class="order-id">${order.id}</div>
              <div class="order-customer">👤 ${order.customerName}</div>
              <div class="order-time">${formatTime(order.createdAt)}</div>
            </div>
            <div>
              <span class="badge ${status.class}">${status.label}</span>
              <span class="fulfillment-badge ${isDelivery ? 'delivery' : ''}" style="margin-left: 4px;">
                ${isDelivery ? '🚚 Delivery' : '🏪 Pickup'}
              </span>
            </div>
          </div>
          
          <div class="order-items">
            ${order.items.map(item => `
              <div class="order-item">
                <div>
                  <span class="item-name">${getDrinkName(item.drinkId)}</span>
                  <div class="item-details">${item.options.length ? item.options.join(', ') : ''}</div>
                </div>
                <span class="item-qty">×${item.quantity}</span>
              </div>
            `).join('')}
          </div>
          
          <div class="order-footer">
            <div class="order-total">${order.currency} ${order.total.toFixed(2)}</div>
            ${order.status === 'paid' ? `
              <div class="order-actions">
                <button class="action-btn primary" onclick="confirmOrder('${order.id}')">
                  Start Preparing
                </button>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // Render orders list
    function renderOrders() {
      const container = document.getElementById('orders-list');
      
      const filtered = currentFilter === 'all' 
        ? orders 
        : orders.filter(o => o.status === currentFilter);
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="no-orders">
            <div class="no-orders-icon">☕</div>
            <p>No ${currentFilter === 'all' ? '' : currentFilter.replace('_', ' ')} orders yet</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filtered.map(renderOrderCard).join('');
    }

    // Update stats
    function updateStats() {
      const total = orders.length;
      const pending = orders.filter(o => o.status === 'pending_payment').length;
      const active = orders.filter(o => ['paid', 'preparing', 'ready', 'out_for_delivery'].includes(o.status)).length;
      
      // Calculate today's revenue from completed/delivered orders
      const today = new Date().toDateString();
      const revenue = orders
        .filter(o => ['paid', 'preparing', 'ready', 'delivered', 'completed'].includes(o.status))
        .filter(o => new Date(o.createdAt).toDateString() === today)
        .reduce((sum, o) => sum + o.total, 0);
      
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-active').textContent = active;
      document.getElementById('stat-revenue').textContent = `$${revenue.toFixed(2)}`;
    }

    // Render shop wallets
    function renderShopWallets(wallets) {
      const container = document.getElementById('shop-wallets');
      
      if (!wallets || wallets.length === 0) {
        container.innerHTML = '<p class="text-muted">No wallets configured</p>';
        return;
      }
      
      container.innerHTML = wallets.map(w => {
        const hasBalance = w.formattedBalance || w.formattedUsdtBalance;
        const hasUsdt = w.usdtBalance && w.usdtBalance !== '0';
        
        return `
          <div class="shop-wallet-item">
            <div class="shop-wallet-chain">
              <span class="chain-dot" data-chain="${w.chain}"></span>
              <span class="chain-name">${w.chain}</span>
            </div>
            ${hasBalance ? `
              <div class="shop-wallet-balances">
                ${w.formattedBalance ? `<span class="shop-balance-native">${w.formattedBalance}</span>` : ''}
                ${w.formattedUsdtBalance ? `<span class="shop-balance-usdt ${hasUsdt ? 'has-balance' : ''}">${w.formattedUsdtBalance}</span>` : ''}
              </div>
            ` : ''}
            <div class="shop-wallet-address" onclick="copyToClipboard('${w.address}')" title="Click to copy">
              ${w.address}
            </div>
          </div>
        `;
      }).join('');
    }

    // Render shop config
    function renderShopConfig(config) {
      if (!config) return;
      
      document.getElementById('config-mode').textContent = config.x402Mode || '—';
      document.getElementById('config-currency').textContent = config.paymentCurrency || '—';
      document.getElementById('config-network').textContent = config.paymentNetwork || '—';
    }

    // Confirm order (start preparing)
    async function confirmOrder(orderId) {
      try {
        const response = await fetch(`${API_BASE}/orders/${orderId}/confirm`, {
          method: 'POST'
        });
        const data = await response.json();
        
        if (data.success) {
          showToast(`Order ${orderId} is now being prepared`, 'success');
          refreshData();
        } else {
          showToast(data.error || 'Failed to confirm order', 'error');
        }
      } catch (error) {
        showToast('Failed to confirm order', 'error');
      }
    }

    // Copy to clipboard
    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard', 'success');
      } catch (err) {
        showToast('Failed to copy', 'error');
      }
    }

    // Show toast
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Setup filter tabs
    function setupFilters() {
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentFilter = tab.dataset.filter;
          renderOrders();
        });
      });
    }

    // Refresh all data
    async function refreshData() {
      await fetchOrders();
      renderOrders();
      updateStats();
    }

    // Initialize
    async function init() {
      // Setup filters
      setupFilters();
      
      // Fetch initial data in parallel
      const [ordersData, menuData, walletsData, configData] = await Promise.all([
        fetchOrders(),
        fetchMenu(),
        fetchShopWallets(),
        fetchShopConfig()
      ]);
      
      // Render initial state
      renderOrders();
      updateStats();
      renderShopWallets(walletsData);
      renderShopConfig(configData);
      
      // Auto-refresh orders every 5 seconds
      setInterval(refreshData, 5000);
    }

    // Start
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
