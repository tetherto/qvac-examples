<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QVAC Coffee · Conversation</title>
<style>
  :root{ --bg:#0e1116; --bg2:#151a22; --line:#273141; --fg:#dfe6f0; --mut:#8a97a8; --accent:#16e3c1; --accent2:#78aaff; --bad:#ff6b6b; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--line)}
  .brand{font-weight:800;letter-spacing:.3px}.brand b{color:var(--accent)}
  .conn{font-size:12px;color:var(--mut)} .conn.ok{color:var(--accent)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;gap:22px;padding:26px 18px 40px;max-width:760px;margin:0 auto;width:100%}
  .orb{position:relative;width:172px;height:172px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);background:radial-gradient(circle at 50% 40%, #1b2230, #11151c);transition:.25s}
  .orb .ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid transparent}
  .orb.listening{border-color:var(--accent)} .orb.listening .ring{border-color:var(--accent);animation:pulse 1.6s ease-out infinite}
  .orb.thinking{border-color:var(--accent2)} .orb.thinking .ring{border-color:var(--accent2);animation:spin 1s linear infinite}
  .orb.speaking{border-color:#ffce6b} .orb.speaking .ring{border-color:#ffce6b;animation:pulse 1s ease-out infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.25);opacity:0}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .orb .label{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px}
  .meter{width:172px;height:5px;border-radius:3px;background:var(--bg2);overflow:hidden}
  .meter>i{display:block;height:100%;width:0;background:var(--accent);transition:width .08s}
  .start{background:var(--accent);color:#06231e;border:none;border-radius:12px;padding:14px 26px;font-size:16px;font-weight:800;cursor:pointer}
  .start:disabled{opacity:.5;cursor:default}
  .row{display:flex;gap:14px;align-items:center}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut)}
  .badge{font-size:12px;color:var(--accent);border:1px solid var(--line);border-radius:20px;padding:3px 11px}
  #log{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .msg{max-width:82%;padding:10px 14px;border-radius:14px;line-height:1.45;white-space:pre-wrap}
  .msg.you{align-self:flex-end;background:var(--bg2);border:1px solid var(--line)}
  .msg.bot{align-self:flex-start;background:#11231f;border:1px solid #1d3b34}
  .msg .lg{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
  .hint{color:var(--mut);font-size:13px;text-align:center;max-width:520px;line-height:1.5}
  .err{color:var(--bad);font-size:13px}
</style>
</head>
<body>
<header>
  <div class="brand">QVAC <b>Coffee</b> · Conversation</div>
  <div class="conn" id="conn">connecting…</div>
</header>
<main>
  <div class="orb" id="orb"><span class="ring"></span><span class="label" id="orbLabel">idle</span></div>
  <div class="meter"><i id="meter"></i></div>
  <div class="row">
    <button class="start" id="start" disabled>Loading models…</button>
    <span class="badge" id="lang">auto language</span>
  </div>
  <label class="toggle"><input type="checkbox" id="duplex" /> Allow interrupting (barge-in)</label>
  <div class="hint" id="hint">Tap start, then just talk. I detect your language automatically and reply in it. No buttons to hold.</div>
  <div id="log"></div>
</main>
<script>
const $ = (id) => document.getElementById(id);
const SR_IN = 16000, SR_OUT = 24000;
let ws, micCtx, micNode, micStream, playCtx, playTime = 0;
let running = false, state = "idle", playing = false, duplex = false;
let bargeFrames = 0;

function setConn(t, ok){ $("conn").textContent = t; $("conn").classList.toggle("ok", !!ok); }
function setState(s){ state = s; const o=$("orb"); o.className = "orb " + (s==="idle"?"":s); $("orbLabel").textContent = s; }
function addMsg(who, text, lang){
  const d = document.createElement("div"); d.className = "msg " + (who==="you"?"you":"bot");
  if (lang) { const l=document.createElement("div"); l.className="lg"; l.textContent = who==="you"?("you · "+lang):("agent · "+lang); d.appendChild(l); }
  const t=document.createElement("div"); t.textContent = text; d.appendChild(t);
  $("log").appendChild(d); window.scrollTo(0, document.body.scrollHeight);
}

// ── WebSocket ──
function connect(){
  ws = new WebSocket((location.protocol==="https:"?"wss":"ws")+"://"+location.host+"/ws");
  ws.binaryType = "arraybuffer";
  ws.onopen = () => setConn("connected", true);
  ws.onclose = () => { setConn("disconnected"); setState("idle"); setTimeout(connect, 1500); };
  ws.onmessage = (e) => {
    if (typeof e.data !== "string") { onAudioChunk(e.data); return; }
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if (m.type === "ready") { $("start").disabled = false; $("start").textContent = "Start conversation"; setConn("ready · models loaded", true); }
    else if (m.type === "state") { if (m.state) setState(m.state); }
    else if (m.type === "user") { addMsg("you", m.text, m.lang); $("lang").textContent = m.lang ? ("language: "+m.lang) : "auto language"; }
    else if (m.type === "agent") { addMsg("bot", m.text, m.lang); }
    else if (m.type === "audio.start") { startPlayback(m.sampleRate || SR_OUT); }
    else if (m.type === "audio.end") { endPlayback(); }
    else if (m.type === "barge.ack") { stopPlaybackNow(); }
    else if (m.type === "error") { const d=document.createElement("div"); d.className="err"; d.textContent="⚠ "+m.message; $("log").appendChild(d); }
  };
}

// ── mic capture (echo-cancelled) -> f32le 16k frames ──
async function startMic(){
  micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true, channelCount:1 } });
  micCtx = new (window.AudioContext||window.webkitAudioContext)({ sampleRate: SR_IN });
  const src = micCtx.createMediaStreamSource(micStream);
  micNode = micCtx.createScriptProcessor(4096, 1, 1);
  src.connect(micNode); micNode.connect(micCtx.destination);
  micNode.onaudioprocess = (ev) => {
    if (!running || !ws || ws.readyState !== 1) return;
    const f32 = ev.inputBuffer.getChannelData(0);
    // RMS meter + barge detection
    let sum=0; for (let i=0;i<f32.length;i++) sum += f32[i]*f32[i];
    const rms = Math.sqrt(sum/f32.length);
    $("meter").style.width = Math.min(100, rms*900) + "%";
    if (playing) {
      // barge-in: sustained energy while the agent speaks (AEC removes the agent's own voice)
      if (rms > 0.045) { if (++bargeFrames >= 3 && duplex) { bargeFrames=0; doBarge(); } }
      else bargeFrames = 0;
      if (!duplex) return; // half-duplex: don't feed mic while speaking
    }
    ws.send(f32.buffer.slice(0)); // copy -> f32le
  };
}
function doBarge(){ stopPlaybackNow(); if (ws && ws.readyState===1) ws.send(JSON.stringify({type:"barge"})); }

// ── playback: Int16 frames @ SR_OUT scheduled on a clock ──
function startPlayback(sr){
  if (!playCtx) playCtx = new (window.AudioContext||window.webkitAudioContext)();
  playing = true; playTime = Math.max(playCtx.currentTime, playTime); $("meter").style.width="0%";
}
function onAudioChunk(arrbuf){
  if (!playing || !playCtx) return;
  const i16 = new Int16Array(arrbuf);
  if (!i16.length) return;
  const f32 = new Float32Array(i16.length);
  for (let i=0;i<i16.length;i++) f32[i] = i16[i] / 32768;
  const b = playCtx.createBuffer(1, f32.length, SR_OUT);
  b.getChannelData(0).set(f32);
  const node = playCtx.createBufferSource(); node.buffer = b; node.connect(playCtx.destination);
  const t = Math.max(playCtx.currentTime + 0.02, playTime);
  node.start(t); playTime = t + b.duration;
}
function endPlayback(){ playing = false; }
function stopPlaybackNow(){
  playing = false;
  if (playCtx) { playCtx.close().catch(()=>{}); playCtx = null; playTime = 0; }
}

$("duplex").onchange = (e) => { duplex = e.target.checked; if (ws&&ws.readyState===1) ws.send(JSON.stringify({type:"config", fullDuplex:duplex})); };
$("start").onclick = async () => {
  if (running) return;
  try { await startMic(); running = true; $("start").textContent = "Listening…"; $("start").disabled = true; $("hint").textContent = "Speak naturally and pause. I'll reply in your language."; setState("listening"); }
  catch (e) { const d=document.createElement("div"); d.className="err"; d.textContent="Mic access failed: "+e.message; $("log").appendChild(d); }
};
connect();
</script>
</body>
</html>
